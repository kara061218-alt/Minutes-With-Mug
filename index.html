```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cafe Journey</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
--coffee:#2c1e16;
--gold:#d4af37;
--bg:#f5f2ec;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

.screen{
display:none;
min-height:100vh;
}

.active{
display:block;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
gap:40px;
padding:15px;
background:white;
border-bottom:3px solid var(--gold);
font-weight:bold;
}

.navbar button{
border:none;
background:none;
font-size:16px;
cursor:pointer;
}

/* HOME */

#home{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
height:80vh;

background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");

background-size:cover;
color:white;
}

.start{
margin-top:30px;
padding:18px 40px;
background:var(--gold);
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* CAFE LIST */

.header{
text-align:center;
font-size:22px;
padding:15px;
}

.cafe-list{
padding:15px;
}

.card{
display:flex;
background:white;
margin-bottom:15px;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.card img{
width:40%;
object-fit:cover;
}

.card-info{
padding:12px;
}

.card-title{
font-weight:bold;
color:var(--coffee);
font-size:18px;
}

.distance{
font-size:14px;
color:#777;
}

/* DETAIL */

.big-banner{
background:#fff6cc;
text-align:center;
padding:25px;
font-size:34px;
font-weight:bold;
border-bottom:4px solid var(--gold);
}

.point{
background:var(--coffee);
padding:30px;
color:white;
text-align:center;
}

.stamps{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
max-width:320px;
margin:auto;
margin-top:20px;
}

.stamp{
aspect-ratio:1;
border-radius:50%;
border:2px dashed rgba(255,255,255,.4);
display:flex;
align-items:center;
justify-content:center;
}

.stamped{
background:var(--gold);
border:none;
color:var(--coffee);
}

.detail{
padding:20px;
}

.images{
display:flex;
gap:10px;
overflow-x:auto;
}

.images img{
width:70%;
border-radius:10px;
}

.menu li{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px dashed #ddd;
}

.qr{
margin-top:20px;
text-align:center;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<button onclick="goHome()">Home</button>

<button onclick="goCafe()">Cafes</button>

</div>

<!-- HOME -->

<div id="home" class="screen active">

<h1>CAFE JOURNEY</h1>

<p>Discover your next favorite cafe</p>

<button class="start" onclick="goCafe()">Explore Cafes</button>

</div>

<!-- LIST -->

<div id="cafes" class="screen">

<div class="header">Explore Cafes</div>

<div class="cafe-list" id="list"></div>

</div>

<!-- DETAIL -->

<div id="detail" class="screen">

<div id="banner"></div>

<div class="point">

<h3>STAMP CARD</h3>

<div class="stamps" id="stamps"></div>

</div>

<div class="detail">

<h2 id="title"></h2>

<div class="images">

<img id="img1">

<img id="img2">

</div>

<p id="desc"></p>

<h3>Menu</h3>

<ul id="menu" class="menu"></ul>

<div class="qr">

<button onclick="startQR()">Scan QR Stamp</button>

<div id="qr-reader" style="width:250px;margin:auto;"></div>

</div>

</div>

</div>

<script>

/* STAMPS */

let stamps=localStorage.getItem("stamps")

if(!stamps){
stamps=26
localStorage.setItem("stamps",stamps)
}

stamps=parseInt(stamps)

/* CAFES */

const cafes=[

{
id:1,

},

{
id:2,

desc:"Late night jazz coffee",
menu:["Dark blend $6","Irish coffee $8"]
},

{
id:3,
name:"Botanica Espresso",

img1:"https://images.unsplash.com/photo-1498804103079-a6351b050096",
img2:"https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81",
desc:"Plant cafe",
menu:["Ethiopia $7","Soy latte $6"]
},

{
id:4,
name:"Industrial Mug",
dist:"2.0km",

img2:"https://images.unsplash.com/photo-1481833761820-0509d3217039",
desc:"Industrial cafe",
menu:["Latte $6"]
},

{
id:5,
name:"Sea Breeze",

img1:"https://images.unsplash.com/photo-1445116572660-236099ec97a0",
img2:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735",
desc:"Ocean theme cafe",
menu:["Cold brew $5"]
},

{
id:6,
name:"Antique Roasters",

img2:"https://images.unsplash.com/photo-1459755486867-b55449bb39ff",
desc:"Retro coffee",
menu:["Flannel drip $7"]
},

{
id:7,
name:"Sakura Terrace",

img1:"https://images.unsplash.com/photo-1521017432531-fbd92d768814",
img2:"https://images.unsplash.com/photo-1494314671902-399b18174975",
desc:"Terrace cafe",

},

{

name:"Minimalist Drop",

img1:"https://images.unsplash.com/photo-1511920170033-f8396924c348",
img2:"https://images.unsplash.com/photo-1461988320302-91bde64fc8e4",
desc:"Minimal cafe",
menu:["Daily black $5"]
},

{
id:9,
name:"Bookworm Cup",
dist:"1.5km",
img1:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
img2:"https://images.unsplash.com/photo-1507133750040-4a8f57021571",
desc:"Books and coffee",
menu:["Readers blend $6"]
},

{
id:10,

img1:"https://images.unsplash.com/photo-1517705008128-361805f42e86",
img2:"https://images.unsplash.com/photo-1447933601403-0c6688de566e",
desc:"Night sky cafe",
menu:["Star macchiato $7"]
}

]

/* NAVIGATION */

function goHome(){

hideAll()

document.getElementById("home").classList.add("active")

}

function goCafe(){

hideAll()

document.getElementById("cafes").classList.add("active")

renderList()

}

function hideAll(){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

}

/* LIST */

function renderList(){

const list=document.getElementById("list")

list.innerHTML=""

cafes.forEach(c=>{

list.innerHTML+=`

<div class="card" onclick="openCafe(${c.id})">

<img src="${c.img1}">

<div class="card-info">

<div class="card-title">${c.name}</div>

<div class="distance">${c.dist}</div>

</div>

</div>

`

})

}

/* DETAIL */

function openCafe(id){

hideAll()

document.getElementById("detail").classList.add("active")

const cafe=cafes.find(c=>c.id===id)

document.getElementById("title").innerText=cafe.name

document.getElementById("img1").src=cafe.img1
document.getElementById("img2").src=cafe.img2

document.getElementById("desc").innerText=cafe.desc

document.getElementById("menu").innerHTML=cafe.menu.map(m=>{

let n=m.split("$")[0]
let p=m.split("$")[1]

return `<li><span>${n}</span><span>$${p}</span></li>`

}).join("")

renderStamp()
renderBanner()

}

/* STAMPS */

function renderStamp(){

const remain=stamps%10

const box=document.getElementById("stamps")

box.innerHTML=""

for(let i=0;i<10;i++){

if(i<remain){
box.innerHTML+=`<div class="stamp stamped">☕</div>`
}else{
box.innerHTML+=`<div class="stamp"></div>`
}

}

}

/* BANNER */

function renderBanner(){

const free=Math.floor(stamps/10)

const banner=document.getElementById("banner")

banner.innerHTML=`<div class="big-banner">Free Coffee × ${free}</div>`

}

/* QR */

function startQR(){

const scanner=new Html5Qrcode("qr-reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
(qrCodeMessage)=>{

if(qrCodeMessage==="CAFE_STAMP"){

stamps++

localStorage.setItem("stamps",stamps)

alert("Stamp Added!")

renderStamp()
renderBanner()

scanner.stop()

}

}
)

}

</script>

</body>
</html>
