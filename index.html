<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cafe Experience</title>
    <style>
        /* (ベースコードのスタイルをそのまま維持) */
        :root { --primary-color: #2c1e16; --accent-color: #d4af37; --bg-color: #f9f6f0; --text-color: #333; }
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        * { box-sizing: border-box; }
        .screen { display: none; min-height: 100vh; width: 100%; padding-bottom: 20px; animation: fadeIn 0.6s ease-out forwards; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 1. Home Screen */
        #home-screen { background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('https://picsum.photos/id/1060/800/1200') center/cover; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .cta-button { background-color: var(--accent-color); color: var(--primary-color); border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; cursor: pointer; }
        
        /* 2. Cafe List Screen */
        #list-screen { padding: 15px; }
        .header { text-align: center; padding: 15px 0; font-size: 1.5rem; font-weight: bold; color: var(--primary-color); border-bottom: 2px solid var(--accent-color); margin-bottom: 20px; }
        .cafe-card { display: flex; height: 22vh; margin-bottom: 15px; background: #fff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; cursor: pointer; }
        .cafe-card-img { flex: 1; background-size: cover; background-position: center; }
        .cafe-card-info { flex: 2.5; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
        
        /* 3. Detail Screen */
        #detail-screen { padding: 0 0 30px 0; background: #fff; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.8); border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; z-index: 10; cursor: pointer; }
        .point-card-container { background: var(--primary-color); padding: 30px 20px; color: white; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; padding-top: 60px; }
        .free-coffee-banner { background: var(--accent-color); color: var(--primary-color); padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; display: inline-block; }
        .stamps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 350px; margin: 0 auto; }
        .stamp-hole { aspect-ratio: 1; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px dashed rgba(212, 175, 55, 0.4); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .stamp-hole.stamped { background: var(--accent-color); color: var(--primary-color); border: none; }
        .detail-content { padding: 20px; }
        .detail-img { min-width: 70%; height: 200px; border-radius: 12px; object-fit: cover; }
        .menu-list { list-style: none; padding: 0; }
        .menu-list li { padding: 12px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="app">
        <div id="home-screen" class="screen active" style="display: flex;">
            <h1>CAFE JOURNEY</h1>
            <button class="cta-button" onclick="goToList()">Let's Explore ☕️</button>
        </div>

        <div id="list-screen" class="screen">
            <div class="header">Explore Cafes</div>
            <div id="cafe-list-container"></div>
        </div>

        <div id="detail-screen" class="screen">
            <div class="point-card-container">
                <button class="back-btn" onclick="goToList()">← Back</button>
                <div id="free-coffee-banner" class="free-coffee-banner"></div>
                <div class="stamps-grid" id="stamps-container"></div>
            </div>
            <div class="detail-content">
                <h2 id="detail-title"></h2>
                <div class="detail-images" style="display:flex; gap:10px; overflow-x:auto;">
                    <img id="detail-img1" class="detail-img" src="">
                    <img id="detail-img2" class="detail-img" src="">
                </div>
                <p id="detail-desc"></p>
                <h3>Menu</h3>
                <ul class="menu-list" id="detail-menu"></ul>
            </div>
        </div>
    </div>

    <script>
        const cafes = [ /* (元のデータ構造を維持) */
            { id: 1, name: "Cafe L'aube", distance: "0.5km", img1: "https://picsum.photos/id/1060/600/400", img2: "https://picsum.photos/id/225/600/400", desc: "...", menu: ["Morning Set $8", "Light Drip $5"] },
            /* ... (他の10個のカフェデータ) ... */
        ];

        function goToDetail(id) {
            document.getElementById('list-screen').classList.remove('active');
            document.getElementById('detail-screen').classList.add('active');
            const cafe = cafes.find(c => c.id === id);
            
            // 演算ロジックの追加
            const totalStamps = 26;
            const freeCount = Math.floor(totalStamps / 10);
            const remainder = totalStamps % 10;

            document.getElementById('free-coffee-banner').innerText = `Free Coffee × ${freeCount}`;
            document.getElementById('detail-title').innerText = cafe.name;
            // ... (画像やメニューの設定処理) ...
            
            renderStamps(remainder); // 余りの数だけスタンプを表示
        }

        function renderStamps(stampedCount) {
            const container = document.getElementById('stamps-container');
            container.innerHTML = Array.from({length: 10}, (_, i) => 
                `<div class="stamp-hole ${i < stampedCount ? 'stamped' : ''}">☕️</div>`
            ).join('');
        }
        
        // ... (他の関数も同様に元の構造を維持)
    </script>
</body>
</html>
