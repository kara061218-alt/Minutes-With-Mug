<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cafe Experience</title>
    <style>
        :root {
            --primary-color: #2c1e16;
            --accent-color: #d4af37;
            --bg-color: #f9f6f0;
            --text-color: #333;
        }
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        * { box-sizing: border-box; }

        .screen { display: none; min-height: 100vh; width: 100%; padding-bottom: 20px; animation: fadeIn 0.6s ease-out forwards; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #home-screen { background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('https://picsum.photos/id/1060/800/1200') center/cover; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .cta-button { background-color: var(--accent-color); color: var(--primary-color); border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); cursor: pointer; }
        
        #list-screen { padding: 15px; }
        .header { text-align: center; padding: 15px 0; font-size: 1.5rem; font-weight: bold; color: var(--primary-color); border-bottom: 2px solid var(--accent-color); margin-bottom: 20px; }
        .cafe-card { display: flex; height: 120px; margin-bottom: 15px; background: #fff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; cursor: pointer; }
        .cafe-card-img { flex: 1; background-size: cover; background-position: center; }
        .cafe-card-info { flex: 2.5; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
        
        #detail-screen { padding: 0 0 30px 0; background: #fff;}
        .back-btn { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.8); border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; z-index: 10; }
        
        /* 複数カード重なり表示用 */
        .cards-stack { position: relative; height: 160px; margin: 20px auto; max-width: 350px; }
        .point-card-container { background: var(--primary-color); padding: 30px 20px; border-radius: 0 0 20px 20px; color: white; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .stamp-layer { position: absolute; width: 100%; transition: transform 0.3s; }
        .stamps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .stamp-hole { aspect-ratio: 1; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px dashed rgba(212, 175, 55, 0.4); display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .stamp-hole.stamped { background: var(--accent-color); border: none; color: var(--primary-color); }
        
        .detail-content { padding: 20px; }
        .detail-img { min-width: 70%; height: 200px; border-radius: 12px; object-fit: cover; }
        .menu-list li { padding: 12px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="app">
        <div id="home-screen" class="screen active" style="display: flex;">
            <h1>CAFE JOURNEY</h1>
            <p>Step away from the ordinary and<br>discover a unique cafe experience.</p>
            <button class="cta-button" onclick="goToList()">Let's Explore ☕️</button>
        </div>

        <div id="list-screen" class="screen">
            <div class="header">Explore Cafes</div>
            <div id="cafe-list-container"></div>
        </div>

        <div id="detail-screen" class="screen">
            <div class="point-card-container">
                <button class="back-btn" onclick="goToList()">← Back</button>
                <div class="point-card-title" style="margin-top: 30px;">MEMBERS CARD</div>
                <div class="cards-stack" id="stamps-container"></div>
                <p style="font-size: 0.8rem; margin-top: 80px; opacity: 0.8;">10 cups for 1 free coffee / 25 cups for 250g free beans</p>
            </div>
            <div class="detail-content">
                <h2 id="detail-title">Cafe Name</h2>
                <div class="detail-images" style="display:flex; gap:10px; overflow-x:auto;">
                    <img id="detail-img1" class="detail-img" src="">
                    <img id="detail-img2" class="detail-img" src="">
                </div>
                <p id="detail-desc"></p>
                <h3>Menu</h3>
                <ul class="menu-list" id="detail-menu"></ul>
            </div>
        </div>
    </div>

    <script>
        const cafes = [
            { id: 1, name: "Morning Ritual", desc: "Start your day right.", menu: ["Latte $6", "Flat White $6", "Cappuccino $6", "Light Drip $5", "Black Coffee $5", "Croissant $4"] },
            { id: 2, name: "Midnight Owl", desc: "A cozy late-night spot.", menu: ["Latte $6", "Flat White $6", "Cappuccino $6", "Drip Coffee $5", "Black Coffee $5", "Chocolate Tart $7"] }
            // 他のカフェも同様の順序で記述してください
        ];

        function renderStamps(total) {
            const container = document.getElementById('stamps-container');
            container.innerHTML = '';
            const layers = Math.ceil(total / 10);
            
            for (let layer = 0; layer < layers; layer++) {
                const layerDiv = document.createElement('div');
                layerDiv.className = 'stamp-layer';
                // 後ろのカードは少しずらして表示
                layerDiv.style.transform = `translateY(${layer * 10}px)`;
                layerDiv.style.zIndex = layers - layer;
                
                let html = '<div class="stamps-grid">';
                for (let i = 0; i < 10; i++) {
                    const current = (layer * 10) + i + 1;
                    const isStamped = current <= total;
                    html += `<div class="stamp-hole ${isStamped ? 'stamped' : ''}">☕️</div>`;
                }
                html += '</div>';
                layerDiv.innerHTML = html;
                container.appendChild(layerDiv);
            }
        }

        function goToList() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('detail-screen').classList.remove('active');
            document.getElementById('list-screen').classList.add('active');
            if(!document.getElementById('cafe-list-container').innerHTML) renderList();
        }

        function goToDetail(id) {
            document.getElementById('list-screen').classList.remove('active');
            document.getElementById('detail-screen').classList.add('active');
            const cafe = cafes.find(c => c.id === id);
            document.getElementById('detail-title').innerText = cafe.name;
            document.getElementById('detail-desc').innerText = cafe.desc;
            document.getElementById('detail-menu').innerHTML = cafe.menu.map(item => `<li><span>${item.split(' $')[0]}</span> <span>$${item.split('$')[1]}</span></li>`).join('');
            renderStamps(14); // 14個で固定
            window.scrollTo(0, 0);
        }

        function renderList() {
            document.getElementById('cafe-list-container').innerHTML = cafes.map(c => `
                <div class="cafe-card" onclick="goToDetail(${c.id})">
                    <div class="cafe-card-img" style="background-color:#eee"></div>
                    <div class="cafe-card-info"><h3>${c.name}</h3></div>
                </div>`).join('');
        }
    </script>
</body>
</html>
