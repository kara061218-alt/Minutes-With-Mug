```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cafe Journey</title>

<style>

:root{
--coffee:#2c1e16;
--gold:#d4af37;
--bg:#f6f3ee;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

.screen{
display:none;
min-height:100vh;
}

.active{
display:block;
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* HOME */

#home{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");
background-size:cover;
color:white;
}

.start{
margin-top:30px;
padding:18px 40px;
background:var(--gold);
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* HEADER */

.header{
background:white;
padding:15px;
border-bottom:3px solid var(--gold);
text-align:center;
font-size:20px;
font-weight:bold;
}

/* SEARCH */

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

/* CAFE LIST */

.cafe-list{
padding:15px;
}

.card{
display:flex;
background:white;
border-radius:12px;
margin-bottom:15px;
overflow:hidden;
box-shadow:0 4px 8px rgba(0,0,0,.08);
cursor:pointer;
}

.card img{
width:40%;
object-fit:cover;
}

.card-info{
padding:12px;
flex:1;
}

.card-title{
font-weight:bold;
font-size:18px;
color:var(--coffee);
}

.distance{
color:#777;
font-size:14px;
}

.favorite{
margin-top:6px;
font-size:14px;
color:#999;
}

/* DETAIL */

.banner{
background:#fff7cc;
padding:10px;
text-align:center;
font-weight:bold;
border-bottom:3px solid var(--gold);
}

.point{
background:var(--coffee);
padding:25px;
color:white;
text-align:center;
}

.stamps{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
max-width:300px;
margin:auto;
margin-top:15px;
}

.stamp{
aspect-ratio:1;
border-radius:50%;
border:2px dashed rgba(255,255,255,.4);
display:flex;
align-items:center;
justify-content:center;
}

.stamped{
background:var(--gold);
border:none;
color:var(--coffee);
}

.detail{
padding:20px;
}

.images{
display:flex;
gap:10px;
overflow-x:auto;
}

.images img{
width:70%;
border-radius:10px;
}

.menu li{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px dashed #ddd;
}

.back{
margin:10px;
border:none;
background:#eee;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<div id="home" class="screen active">

<h1>CAFE JOURNEY</h1>
<p>Discover your next favorite cafe</p>

<button class="start" onclick="openList()">Explore Cafes</button>

</div>

<div id="list" class="screen">

<div class="header">Explore Cafes</div>

<div class="search">
<input id="searchBox" placeholder="Search cafe..." oninput="searchCafe()">
</div>

<div class="cafe-list" id="cafeList"></div>

</div>

<div id="detail" class="screen">

<div id="banner"></div>

<button class="back" onclick="openList()">← Back</button>

<div class="point">

<h3>STAMP CARD</h3>

<div class="stamps" id="stamps"></div>

</div>

<div class="detail">

<h2 id="title"></h2>

<div class="images">
<img id="img1">
<img id="img2">
</div>

<p id="desc"></p>

<h3>Menu</h3>

<ul id="menu" class="menu"></ul>

<button onclick="addStamp()">+ Add Stamp</button>

<button onclick="toggleFavorite()">★ Favorite</button>

</div>

</div>

<script>

/* ===== STAMPS ===== */

let totalStamps = localStorage.getItem("stamps")

if(!totalStamps){
totalStamps = 26
localStorage.setItem("stamps",totalStamps)
}

totalStamps=parseInt(totalStamps)

/* ===== FAVORITES ===== */

let favorites = JSON.parse(localStorage.getItem("fav")) || []

/* ===== CAFE DATA ===== */

const cafes=[

{id:1,name:"Cafe L'aube",dist:"0.5km",
img1:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",
img2:"https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb",
desc:"Morning sunlight cafe",
menu:["Drip $5","Croissant $3","Morning set $8"]
},

{id:2,name:"Midnight Owl",dist:"3.2km",
img1:"https://images.unsplash.com/photo-1442512595331-e89e73853f31",
img2:"https://images.unsplash.com/photo-1463797221720-6b07e6426c24",
desc:"Late night jazz coffee",
menu:["Dark blend $6","Irish coffee $8"]
},

{id:3,name:"Botanica Espresso",dist:"1.1km",
img1:"https://images.unsplash.com/photo-1498804103079-a6351b050096",
img2:"https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81",
desc:"Plant filled cafe",
menu:["Ethiopia $7","Soy latte $6"]
},

{id:4,name:"Industrial Mug",dist:"2.0km",
img1:"https://images.unsplash.com/photo-1453614512568-c4024d13c247",
img2:"https://images.unsplash.com/photo-1481833761820-0509d3217039",
desc:"Concrete design cafe",
menu:["Latte $6","Flat white $6"]
},

{id:5,name:"Sea Breeze",dist:"4.5km",
img1:"https://images.unsplash.com/photo-1445116572660-236099ec97a0",
img2:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735",
desc:"Ocean themed cafe",
menu:["Cold brew $5","Cake $4"]
},

{id:6,name:"Antique Roasters",dist:"1.8km",
img1:"https://images.unsplash.com/photo-1504754524776-8f4f37790ca0",
img2:"https://images.unsplash.com/photo-1459755486867-b55449bb39ff",
desc:"Retro furniture cafe",
menu:["Flannel drip $7"]
},

{id:7,name:"Sakura Terrace",dist:"0.9km",
img1:"https://images.unsplash.com/photo-1521017432531-fbd92d768814",
img2:"https://images.unsplash.com/photo-1494314671902-399b18174975",
desc:"Terrace cafe",
menu:["Matcha latte $6"]
},

{id:8,name:"Minimalist Drop",dist:"2.3km",
img1:"https://images.unsplash.com/photo-1511920170033-f8396924c348",
img2:"https://images.unsplash.com/photo-1461988320302-91bde64fc8e4",
desc:"Minimal design cafe",
menu:["Daily black $5"]
},

{id:9,name:"Bookworm Cup",dist:"1.5km",
img1:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
img2:"https://images.unsplash.com/photo-1507133750040-4a8f57021571",
desc:"Coffee and books",
menu:["Readers blend $6"]
},

{id:10,name:"Starry Night",dist:"3.8km",
img1:"https://images.unsplash.com/photo-1517705008128-361805f42e86",
img2:"https://images.unsplash.com/photo-1447933601403-0c6688de566e",
desc:"Night sky cafe",
menu:["Star macchiato $7"]
}

]

let currentCafe=null

/* NAVIGATION */

function openList(){

document.getElementById("home").classList.remove("active")
document.getElementById("detail").classList.remove("active")

document.getElementById("list").classList.add("active")

renderList(cafes)

}

/* LIST */

function renderList(data){

const list=document.getElementById("cafeList")
list.innerHTML=""

data.forEach(c=>{

let fav=favorites.includes(c.id)?"★ Favorite":"☆"

list.innerHTML+=`
<div class="card" onclick="openDetail(${c.id})">
<img src="${c.img1}">
<div class="card-info">
<div class="card-title">${c.name}</div>
<div class="distance">${c.dist}</div>
<div class="favorite">${fav}</div>
</div>
</div>
`

})

}

/* SEARCH */

function searchCafe(){

const keyword=document.getElementById("searchBox").value.toLowerCase()

const filtered=cafes.filter(c=>c.name.toLowerCase().includes(keyword))

renderList(filtered)

}

/* DETAIL */

function openDetail(id){

currentCafe=id

document.getElementById("list").classList.remove("active")
document.getElementById("detail").classList.add("active")

const cafe=cafes.find(c=>c.id===id)

document.getElementById("title").innerText=cafe.name

document.getElementById("img1").src=cafe.img1
document.getElementById("img2").src=cafe.img2

document.getElementById("desc").innerText=cafe.desc

document.getElementById("menu").innerHTML=cafe.menu.map(m=>{

let n=m.split("$")[0]
let p=m.split("$")[1]

return `<li><span>${n}</span><span>$${p}</span></li>`

}).join("")

renderStamps()
renderBanner()

}

/* STAMP */

function renderStamps(){

const remain=totalStamps%10

const box=document.getElementById("stamps")

box.innerHTML=""

for(let i=0;i<10;i++){

if(i<remain){
box.innerHTML+=`<div class="stamp stamped">☕</div>`
}else{
box.innerHTML+=`<div class="stamp"></div>`
}

}

}

/* BANNER */

function renderBanner(){

const free=Math.floor(totalStamps/10)

const banner=document.getElementById("banner")

if(free>0){
banner.innerHTML=`<div class="banner">Free Coffee × ${free}</div>`
}else{
banner.innerHTML=""
}

}

/* ADD STAMP */

function addStamp(){

totalStamps++

localStorage.setItem("stamps",totalStamps)

renderStamps()
renderBanner()

}

/* FAVORITE */

function toggleFavorite(){

if(favorites.includes(currentCafe)){

favorites=favorites.filter(f=>f!==currentCafe)

}else{

favorites.push(currentCafe)

}

localStorage.setItem("fav",JSON.stringify(favorites))

alert("Saved")

}

</script>

</body>
</html>
