<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cafe Journey</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
--coffee:#2c1e16;
--gold:#d4af37;
--bg:#f6f3ee;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

/* NAV */

.nav{
display:flex;
justify-content:center;
gap:40px;
padding:15px;
background:white;
border-bottom:3px solid var(--gold);
font-weight:bold;
}

.nav button{
background:none;
border:none;
font-size:16px;
cursor:pointer;
}

/* PAGE */

.page{
display:none;
}

.active{
display:block;
}

/* HERO */

.hero{
height:90vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");

background-size:cover;
color:white;
}

.hero button{
margin-top:30px;
padding:18px 40px;
border:none;
border-radius:30px;
background:var(--gold);
font-size:18px;
cursor:pointer;
}

/* PROJECT */

.project{
padding:60px 25px;
text-align:center;
}

.project img{
width:100%;
border-radius:12px;
margin-top:20px;
}

/* CAFE GRID */

.cafe-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

padding:10px;

}

.cafe{

height:50vh;

background:white;

border-radius:12px;

overflow:hidden;

box-shadow:0 4px 8px rgba(0,0,0,.1);

display:flex;

flex-direction:column;

cursor:pointer;

}

.cafe img{

height:70%;

object-fit:cover;

}

.cafe-name{

padding:10px;

font-weight:bold;

text-align:center;

}

/* DETAIL */

.banner{

background:#fff6cc;

text-align:center;

padding:30px;

font-size:36px;

font-weight:bold;

border-bottom:4px solid var(--gold);

}

.point{

background:var(--coffee);

color:white;

padding:30px;

text-align:center;

}

.stamps{

display:grid;

grid-template-columns:repeat(5,1fr);

gap:10px;

max-width:300px;

margin:auto;

margin-top:20px;

}

.stamp{

aspect-ratio:1;

border-radius:50%;

border:2px dashed rgba(255,255,255,.4);

display:flex;

align-items:center;

justify-content:center;

}

.stamped{

background:var(--gold);

border:none;

color:var(--coffee);

}

.detail{

padding:20px;

}

.images{

display:flex;

gap:10px;

overflow-x:auto;

}

.images img{

width:70%;

border-radius:10px;

}

.menu li{

display:flex;

justify-content:space-between;

padding:10px 0;

border-bottom:1px dashed #ddd;

}

</style>
</head>

<body>

<div class="nav">

<button onclick="show('home')">Home</button>

<button onclick="show('cafes')">Cafes</button>

</div>

<!-- HOME -->

<div id="home" class="page active">

<div class="hero">

<h1>CAFE JOURNEY</h1>

<p>Discover your next favorite cafe</p>

<button onclick="show('cafes')">Explore Cafes</button>

</div>

<div class="project">

<h2>Our Mission</h2>

<p>

This project aims to reduce disposable coffee cups.
Enjoy coffee inside cafes and create moments of relaxation.

</p>

<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">

</div>

</div>

<!-- CAFES -->

<div id="cafes" class="page">

<div class="cafe-grid" id="grid"></div>

</div>

<!-- DETAIL -->

<div id="detail" class="page">

<div id="banner"></div>

<div class="point">

<h3>STAMP CARD</h3>

<div class="stamps" id="stamps"></div>

</div>

<div class="detail">

<h2 id="title"></h2>

<div class="images">

<img id="img1">

<img id="img2">

</div>

<p id="desc"></p>

<ul id="menu" class="menu"></ul>

<button onclick="scanQR()">Scan QR Stamp</button>

<div id="qr-reader" style="width:250px"></div>

</div>

</div>

<script>

/* STAMP DATA */

let stamps=JSON.parse(localStorage.getItem("stamps"))||{}

/* CAFES */

const cafes=[

{ id:1,name:"Cafe L'aube",
img1:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",
img2:"https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb",
desc:"Morning sunlight cafe",
menu:["Drip $5"]},

{ id:2,name:"Midnight Owl",
img1:"https://images.unsplash.com/photo-1442512595331-e89e73853f31",
img2:"https://images.unsplash.com/photo-1463797221720-6b07e6426c24",
desc:"Late night coffee",
menu:["Dark blend $6"]},

{ id:3,name:"Botanica",
img1:"https://images.unsplash.com/photo-1498804103079-a6351b050096",
img2:"https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81",
desc:"Plant cafe",
menu:["Ethiopia $7"]},

{ id:4,name:"Industrial Mug",
img1:"https://images.unsplash.com/photo-1453614512568-c4024d13c247",
img2:"https://images.unsplash.com/photo-1481833761820-0509d3217039",
desc:"Industrial cafe",
menu:["Latte $6"]},

{ id:5,name:"Sea Breeze",
img1:"https://images.unsplash.com/photo-1445116572660-236099ec97a0",
img2:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735",
desc:"Ocean cafe",
menu:["Cold brew $5"]},

{ id:6,name:"Antique Roasters",
img1:"https://images.unsplash.com/photo-1504754524776-8f4f37790ca0",
img2:"https://images.unsplash.com/photo-1459755486867-b55449bb39ff",
desc:"Retro cafe",
menu:["Flannel drip $7"]},

{ id:7,name:"Sakura Terrace",
img1:"https://images.unsplash.com/photo-1521017432531-fbd92d768814",
img2:"https://images.unsplash.com/photo-1494314671902-399b18174975",
desc:"Terrace cafe",
menu:["Matcha latte $6"]},

{ id:8,name:"Minimalist Drop",
img1:"https://images.unsplash.com/photo-1511920170033-f8396924c348",
img2:"https://images.unsplash.com/photo-1461988320302-91bde64fc8e4",
desc:"Minimal cafe",
menu:["Daily black $5"]},

{ id:9,name:"Bookworm Cup",
img1:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
img2:"https://images.unsplash.com/photo-1507133750040-4a8f57021571",
desc:"Books cafe",
menu:["Readers blend $6"]},

{ id:10,name:"Starry Night",
img1:"https://images.unsplash.com/photo-1517705008128-361805f42e86",
img2:"https://images.unsplash.com/photo-1447933601403-0c6688de566e",
desc:"Night sky cafe",
menu:["Star macchiato $7"]}

]

/* NAV */

function show(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="cafes") renderGrid()

}

/* GRID */

function renderGrid(){

const grid=document.getElementById("grid")

grid.innerHTML=""

cafes.forEach(c=>{

grid.innerHTML+=`

<div class="cafe" onclick="openCafe(${c.id})">

<img src="${c.img1}">

<div class="cafe-name">${c.name}</div>

</div>

`

})

}

/* DETAIL */

let currentCafe=null

function openCafe(id){

currentCafe=id

show("detail")

const cafe=cafes.find(c=>c.id===id)

title.innerText=cafe.name
img1.src=cafe.img1
img2.src=cafe.img2
desc.innerText=cafe.desc

menu.innerHTML=cafe.menu.map(m=>{

let n=m.split("$")[0]
let p=m.split("$")[1]

return `<li><span>${n}</span><span>$${p}</span></li>`

}).join("")

renderStamp()

}

/* STAMP */

function renderStamp(){

let count=stamps[currentCafe]||0

let free=Math.floor(count/10)

let remain=count%10

banner.innerHTML=`<div class="banner">Free Coffee × ${free}</div>`

const box=document.getElementById("stamps")

box.innerHTML=""

for(let i=0;i<10;i++){

if(i<remain){

box.innerHTML+=`<div class="stamp stamped">☕</div>`

}else{

box.innerHTML+=`<div class="stamp"></div>`

}

}

}

/* QR */

function scanQR(){

const scanner=new Html5Qrcode("qr-reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
(msg)=>{

if(msg==="CAFE_STAMP"){

stamps[currentCafe]=(stamps[currentCafe]||0)+1

localStorage.setItem("stamps",JSON.stringify(stamps))

alert("Stamp added!")

renderStamp()

scanner.stop()

}

}
)

}

</script>

</body>
</html>
